<svg width="960" height="720" viewBox="0 0 960 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="960" height="720" fill="#E7E0D6"/>
  <rect x="68" y="50" width="824" height="620" rx="16" fill="#FCFAF7"/>
  <rect x="108" y="98" width="178" height="42" rx="21" fill="#E8DBC8"/>
  <text x="137" y="125" fill="#8B6A43" font-size="18" font-family="Arial, sans-serif" letter-spacing="1.6">LECTURE ALLÉGÉE</text>

  <text x="108" y="196" fill="#2D2621" font-size="42" font-family="Georgia, serif">Les dieux voulant instruire</text>
  <text x="108" y="240" fill="#2D2621" font-size="42" font-family="Georgia, serif">un fils de Jupiter</text>
  <text x="108" y="280" fill="#766D64" font-size="24" font-family="Arial, sans-serif">Jean de La Fontaine · Livre XI · Fable 2</text>

  <rect x="108" y="322" width="676" height="236" rx="16" fill="#F6F1EA" stroke="#E3D5C1" stroke-width="2"/>
  <text x="142" y="378" fill="#2F2A26" font-size="30" font-family="Arial, sans-serif">
    <tspan x="142" dy="0">Jupiter eut un fils, qui, se sentant du lieu</tspan>
    <tspan x="142" dy="46">dont il tirait l'origine, avait l'âme</tspan>
    <tspan x="142" dy="46">toute divine.</tspan>
  </text>
  <text x="142" y="516" fill="#547A7D" font-size="30" font-family="Arial, sans-serif">
    <tspan x="142" dy="0">L'enfance n'aime rien :</tspan>
    <tspan x="142" dy="46">celle du jeune dieu faisait sa principale affaire</tspan>
    <tspan x="142" dy="46">des doux soins d'aimer et de plaire.</tspan>
  </text>

  <rect x="808" y="170" width="54" height="370" rx="18" fill="#F4ECE2"/>
  <rect x="824" y="210" width="22" height="96" rx="11" fill="#D8C2A1"/>
  <rect x="824" y="330" width="22" height="130" rx="11" fill="#E7D7C2"/>

  <rect x="108" y="586" width="754" height="40" rx="10" fill="#F1E8DC"/>
  <text x="132" y="612" fill="#7A705F" font-size="18" font-family="Arial, sans-serif">
    Titre clarifié · respiration accrue · lecture stable dans Odysey
  </text>
</svg>
